<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnCall Agent - 后台管理系统</title>
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="admin-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>OnCall Agent</h2>
                <p>后台管理系统</p>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="icon">📊</span>
                    <span>数据概览</span>
                </a>
                <a href="#" class="nav-item" data-page="sessions">
                    <span class="icon">💬</span>
                    <span>会话管理</span>
                </a>
                <a href="#" class="nav-item" data-page="stats">
                    <span class="icon">📈</span>
                    <span>统计分析</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <span id="adminUsername">管理员</span>
                </div>
                <a href="#" class="logout-link" onclick="logout(); return false;">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 17L21 12L16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>退出登录</span>
                </a>
                <a href="/" class="back-link">← 返回对话界面</a>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 数据概览页面 -->
            <div id="dashboard-page" class="page active">
                <div class="page-header">
                    <h1>数据概览</h1>
                    <p class="update-time">最后更新: <span id="update-time"></span></p>
                </div>

                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-icon">💬</div>
                        <div class="stat-value" id="total-sessions">0</div>
                        <div class="stat-label">总会话数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📝</div>
                        <div class="stat-value" id="total-messages">0</div>
                        <div class="stat-label">总消息数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🟢</div>
                        <div class="stat-value" id="active-sessions">0</div>
                        <div class="stat-label">活跃会话</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">👥</div>
                        <div class="stat-value" id="total-users">0</div>
                        <div class="stat-label">用户数</div>
                    </div>
                </div>

                <div class="today-stats">
                    <h3>今日数据</h3>
                    <div class="today-cards">
                        <div class="today-card">
                            <span class="today-value" id="today-sessions">0</span>
                            <span class="today-label">今日新会话</span>
                        </div>
                        <div class="today-card">
                            <span class="today-value" id="today-messages">0</span>
                            <span class="today-label">今日新消息</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 会话管理页面 -->
            <div id="sessions-page" class="page">
                <div class="page-header">
                    <h1>会话管理</h1>
                    <div class="header-actions">
                        <input type="text" id="search-input" placeholder="搜索会话..." class="search-input">
                        <select id="status-filter" class="filter-select">
                            <option value="all">全部状态</option>
                            <option value="active">活跃</option>
                            <option value="closed">已关闭</option>
                        </select>
                    </div>
                </div>

                <div class="sessions-table">
                    <table>
                        <thead>
                            <tr>
                                <th>会话ID</th>
                                <th>标题</th>
                                <th>状态</th>
                                <th>消息数</th>
                                <th>创建时间</th>
                                <th>更新时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="sessions-tbody">
                            <!-- 动态填充 -->
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="sessions-pagination">
                    <!-- 动态填充 -->
                </div>
            </div>

            <!-- 消息详情弹窗 -->
            <div id="messages-modal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>会话消息详情</h2>
                        <span class="modal-close" onclick="closeModal()">×</span>
                    </div>
                    <div class="modal-body">
                        <div class="session-info" id="modal-session-info">
                            <!-- 动态填充 -->
                        </div>
                        <div class="messages-list" id="modal-messages">
                            <!-- 动态填充 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 统计分析页面 -->
            <div id="stats-page" class="page">
                <div class="page-header">
                    <h1>统计分析</h1>
                    <div class="header-actions">
                        <select id="stats-days" class="filter-select" onchange="loadStatsChart()">
                            <option value="7">最近7天</option>
                            <option value="14">最近14天</option>
                            <option value="30">最近30天</option>
                        </select>
                    </div>
                </div>

                <div class="charts-container">
                    <div class="chart-card">
                        <h3>会话趋势</h3>
                        <canvas id="sessions-chart"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3>消息趋势</h3>
                        <canvas id="messages-chart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
